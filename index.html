<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LSU OpenAlex Research Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      margin: 0;
      padding: 20px;
    }
    h1 {
      color: #461D7C; /* LSU Purple */
    }
    h2 {
      margin-top: 40px;
      color: #333;
    }
    table {
      width: 100%;
      background: #fff;
      border-collapse: collapse;
      margin-top: 12px;
      border-radius: 6px;
      overflow: hidden;
    }
    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }
    th {
      background: #eee;
      font-weight: bold;
      text-align: left;
    }
    tr:hover {
      background: #fafafa;
    }
    .loading {
      color: gray;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>LSU OpenAlex Research Dashboard</h1>
<p><strong>Louisiana State University · Baton Rouge, LA</strong></p>

<!-- Recent Publications -->
<h2>Recent Publications</h2>
<div id="recent-loading" class="loading">Loading recent publications…</div>
<table id="recent-table">
  <thead>
    <tr>
      <th>Work Title</th>
      <th>Type</th>
      <th>Date</th>
      <th>Journal</th>
      <th>OA</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<!-- Top Cited -->
<h2>Top 25 Most Cited Works</h2>
<div id="cited-loading" class="loading">Loading most cited works…</div>
<table id="cited-table">
  <thead>
    <tr>
      <th>#</th>
      <th>Title</th>
      <th>Year</th>
      <th>Citations</th>
      <th>Journal</th>
      <th>OA</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const LSU_ROR = "https://ror.org/05d5m5982";
const BASE_URL = "https://api.openalex.org/works";

// Reusable fetch function
async function fetchWorks(params) {
  const url = `${BASE_URL}?filter=institutions.ror:${LSU_ROR},${params}`;
  const res = await fetch(url);
  return res.json();
}

// Format helpers
function oaLabel(oa) {
  return oa?.is_oa ? oa.oa_status : "Closed";
}

function getJournal(work) {
  return work.primary_location?.source?.display_name || "—";
}

// Populate Recent
async function loadRecent() {
  const data = await fetchWorks("from_publication_date:2024-01-01&per_page=20&sort=publication_date:desc");

  const tbody = document.querySelector("#recent-table tbody");
  tbody.innerHTML = "";

  data.results.forEach(work => {
    tbody.innerHTML += `
      <tr>
        <td>${work.display_name}</td>
        <td>${work.type}</td>
        <td>${work.publication_date || "—"}</td>
        <td>${getJournal(work)}</td>
        <td>${oaLabel(work.open_access)}</td>
      </tr>
    `;
  });

  document.getElementById("recent-loading").style.display = "none";
}

// Populate Top Cited
async function loadTopCited() {
  const data = await fetchWorks("type:journal-article&per_page=25&sort=cited_by_count:desc");

  const tbody = document.querySelector("#cited-table tbody");
  tbody.innerHTML = "";

  data.results.forEach((work, i) => {
    tbody.innerHTML += `
      <tr>
        <td>${i + 1}</td>
        <td>${work.display_name}</td>
        <td>${work.publication_year}</td>
        <td>${work.cited_by_count}</td>
        <td>${getJournal(work)}</td>
        <td>${oaLabel(work.open_access)}</td>
      </tr>
    `;
  });

  document.getElementById("cited-loading").style.display = "none";
}

// Load all sections
loadRecent();
loadTopCited();
</script>

</body>
</html>
``
